name: Atualizar Relatorios CLIF

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install pandas gspread oauth2client selenium==4.10.0 openpyxl
          # Removi o undetected-chromedriver e o webdriver-manager aqui

      - name: Rodar Script do Thiago
        run: python robo_mestre.py
        env:
          USUARIO: ${{ secrets.USUARIO_CLIF }}
          SENHA: ${{ secrets.SENHA_CLIF }}
          GOOGLE_CHAVE_JSON: ${{ secrets.GOOGLE_CHAVE }}
